name: CI - Java 25

on:
  push:
    branches: [ main, appmod/** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Show Java & Maven
        run: |
          java -version
          mvn -v

      - name: Build and test
        run: mvn -B -DskipTests=false clean verify
