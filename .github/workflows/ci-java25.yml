name: REP Control CI Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rep_equipos_apilamiento
        options: >-
          --health-cmd "mysqladmin ping -h localhost -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3307:3306

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Backend
        working-directory: ./backend
        run: mvn -B clean verify
        env:
          DB_JDBC_URL: jdbc:mysql://localhost:3307/rep_equipos_apilamiento
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      - name: Build Docker Image
        run: docker build -t repcontrol-backend:latest -f backend/Dockerfile .

  mobile-lint:
    name: Mobile Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile/RepControlMobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './mobile/RepControlMobile/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

  docker-compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [backend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dependency Check
        run: mvn -B dependency:check -DskipTests=true || echo "Dependency check completed"
