quarkus.http.port=19999
quarkus.application.name=rep-control-backend-test

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.flyway.migrate-at-start=false

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:8081
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.log.level=WARN
quarkus.log.console.enable=true

mp.jwt.verify.issuer=https://repcontrol.pe
mp.jwt.verify.secretkey=test-secret-key-for-testing-only-minimum-32-chars!!
smallrye.jwt.new-token.signature-algorithm=HS256
smallrye.jwt.new-token.issuer=https://repcontrol.pe
smallrye.jwt.new-token.lifespan=900

quarkus.http.auth.permission.authenticated.paths=/api/v1/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.authenticated.methods=GET,POST,PUT,DELETE
quarkus.http.auth.permission.public.paths=/api/v1/auth/login,/api/v1/auth/refresh,/q/health,/openapi,/swagger/*
quarkus.http.auth.permission.public.policy=permit
